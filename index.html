<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Student Management System Pro</title>
<style>
body{margin:0;font-family:Segoe UI,sans-serif;background:linear-gradient(135deg,#4f46e5,#06b6d4);padding:25px;color:white;min-height:100vh}
.container{max-width:1200px;margin:auto;background:rgba(255,255,255,.12);backdrop-filter:blur(12px);padding:25px;border-radius:20px}
h1{text-align:center}.form{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
input,select,button{padding:12px;border:none;border-radius:10px;font-size:15px}
button{background:#22c55e;color:white;font-weight:bold;cursor:pointer}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}.card{background:rgba(255,255,255,.15);padding:15px;border-radius:15px;text-align:center}
table{width:100%;margin-top:20px;border-collapse:collapse;background:white;color:black;border-radius:15px;overflow:hidden}th,td{padding:12px;border-bottom:1px solid #ddd;text-align:center}th{background:#4338ca;color:white}.deleteBtn{background:#ef4444;padding:8px 12px;border:none;border-radius:8px;color:white;cursor:pointer}@media(max-width:700px){.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h1>🎓 Student Management System Pro</h1>
<div class="form">
<input id="name" placeholder="Student Name">
<input id="roll" placeholder="Roll Number">
<input id="branch" placeholder="Branch">
<input id="cgpa" type="number" step="0.1" placeholder="CGPA">
<select id="year"><option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option></select>
<button onclick="addStudent()">Add Student</button>
</div>
<div class="cards">
<div class="card"><h3>Total Students</h3><h2 id="total">0</h2></div>
<div class="card"><h3>Average CGPA</h3><h2 id="avg">0.00</h2></div>
<div class="card"><h3>Top Performer</h3><h2 id="top">-</h2></div>
</div>
<table>
<thead><tr><th>Name</th><th>Roll No</th><th>Branch</th><th>Year</th><th>CGPA</th><th>Action</th></tr></thead>
<tbody id="tableBody"></tbody>
</table>
</div>
<script>
let students=[];
function addStudent(){
let name=document.getElementById('name').value.trim();
let roll=document.getElementById('roll').value.trim();
let branch=document.getElementById('branch').value.trim();
let cgpa=parseFloat(document.getElementById('cgpa').value);
let year=document.getElementById('year').value;
if(!name||!roll||!branch||isNaN(cgpa)){alert('Please fill all fields');return;}
students.push({name,roll,branch,cgpa,year});
render();
document.getElementById('name').value='';document.getElementById('roll').value='';document.getElementById('branch').value='';document.getElementById('cgpa').value='';
}
function render(){
const body=document.getElementById('tableBody');body.innerHTML='';
students.forEach((s,i)=>{body.innerHTML+=`<tr><td>${s.name}</td><td>${s.roll}</td><td>${s.branch}</td><td>${s.year}</td><td>${s.cgpa}</td><td><button class='deleteBtn' onclick='removeStudent(${i})'>Delete</button></td></tr>`;});
document.getElementById('total').innerText=students.length;
let avg=students.length?(students.reduce((a,b)=>a+b.cgpa,0)/students.length).toFixed(2):'0.00';
document.getElementById('avg').innerText=avg;
if(students.length){let top=students.reduce((a,b)=>a.cgpa>b.cgpa?a:b);document.getElementById('top').innerText=top.name;}else{document.getElementById('top').innerText='-';}
}
function removeStudent(i){students.splice(i,1);render();}
</script>
</body></html>
